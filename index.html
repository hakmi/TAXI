<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة عبد الكريم السحابية</title>
    <!-- استدعاء خطوط وتصميم أنيق للمنصة -->
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <style>
        @import url('[https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap](https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap)');
        body {
            font-family: 'Cairo', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col justify-between">

    <!-- شريط الرأس (Header) -->
    <header class="bg-slate-800 p-4 shadow-lg border-b border-slate-700">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-orange-500">منصة عبد الكريم السحابية ☁️</h1>
            <span class="bg-emerald-500/20 text-emerald-400 text-xs px-2 py-1 rounded-full border border-emerald-500/30">مشروع متصل بالسحابة</span>
        </div>
    </header>

    <!-- محتوى المنصة الرئيسي -->
    <main class="container mx-auto p-6 flex-grow max-w-4xl">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- قسم إدخال وإرسال البيانات -->
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
                <h2 class="text-lg font-bold mb-4 text-slate-300">إرسال بيانات جديدة للسحابة</h2>
                <form id="dataForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">اسم المرسل:</label>
                        <input type="text" id="senderName" required placeholder="أدخل اسمك هنا..." class="w-full p-3 bg-slate-900 border border-slate-700 rounded-lg focus:outline-none focus:border-orange-500 text-white transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">الرسالة أو الملاحظة:</label>
                        <textarea id="messageText" required rows="3" placeholder="اكتب رسالتك السحابية هنا..." class="w-full p-3 bg-slate-900 border border-slate-700 rounded-lg focus:outline-none focus:border-orange-500 text-white transition"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-bold py-3 px-4 rounded-lg shadow-lg shadow-orange-600/20 transition duration-150">
                        إرسال إلى قاعدة البيانات
                    </button>
                </form>
                <p id="statusMessage" class="mt-3 text-sm text-center hidden"></p>
            </div>

            <!-- قسم استعراض البيانات من السحابة -->
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl flex flex-col h-[400px]">
                <h2 class="text-lg font-bold mb-4 text-slate-300">البيانات الحية من السحابة</h2>
                <div id="messagesContainer" class="flex-grow overflow-y-auto space-y-3 pr-2 scrollbar-thin scrollbar-thumb-slate-700">
                    <div class="text-slate-500 text-center py-8">جاري التحميل والاتصال بالسحابة...</div>
                </div>
            </div>

        </div>
    </main>

    <!-- تذييل الصفحة -->
    <footer class="bg-slate-950 p-4 text-center text-sm text-slate-500 border-t border-slate-800">
        جميع الحقوق محفوظة لمنصة عبد الكريم البرمجية &copy; 2026
    </footer>

    <!-- استدعاء مكتبات Firebase السحابية عبر الـ CDN -->
    <script type="module">
        // استدعاء حزم Firebase الأساسية وقاعدة بيانات Firestore من موزع خدمات الويب
        import { initializeApp } from "[https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js](https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js)";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "[https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js](https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js)";

        // 1. كود الاتصال السحابي بمشروعك (مأخوذ مباشرة من إعدادات مشروعك في الصورة)
        const firebaseConfig = {
            apiKey: "AIzaSyCsoqh7L_lhjKU5U94ra5T5GmoiPGpGWc4",
            authDomain: "myprojectname-1a84b.firebaseapp.com",
            projectId: "myprojectname-1a84b",
            storageBucket: "myprojectname-1a84b.firebasestorage.app",
            messagingSenderId: "35220501993",
            appId: "1:359220501993:web:9f8977ddf06a246ed0bf78",
            measurementId: "G-MCZC6CY286"
        };

        // 2. تهيئة الاتصال بفايربيس وقاعدة البيانات
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // الإشارة لعناصر واجهة المستخدم
        const dataForm = document.getElementById('dataForm');
        const senderNameInput = document.getElementById('senderName');
        const messageTextInput = document.getElementById('messageText');
        const statusMessage = document.getElementById('statusMessage');
        const messagesContainer = document.getElementById('messagesContainer');

        // مرجع لمجموعة البيانات داخل السحابة (Collection سنطلق عليها اسم "user_messages")
        const messagesCollection = collection(db, "user_messages");

        // 3. كود إرسال البيانات إلى السحابة عند إرسال النموذج
        dataForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const sender = senderNameInput.value.trim();
            const message = messageTextInput.value.trim();

            showStatus("جاري إرسال بياناتك للسحابة...", "text-orange-400");

            try {
                // إرسال كائن البيانات إلى السحابة
                await addDoc(messagesCollection, {
                    name: sender,
                    text: message,
                    timestamp: serverTimestamp() // تسجيل الوقت السحابي لترتيب الرسائل بدقة
                });

                // تصفير الخانات البرمجية بعد نجاح الإرسال
                messageTextInput.value = '';
                showStatus("✅ تم حفظ البيانات في السحابة بنجاح!", "text-emerald-400");
                
                setTimeout(() => {
                    statusMessage.classList.add('hidden');
                }, 3000);

            } catch (error) {
                console.error("حدث خطأ أثناء الاتصال بالخادم السحابي:", error);
                showStatus("❌ فشل الاتصال بالسحابة: " + error.message, "text-rose-400");
            }
        });

        // دالة مساعدة لتحديث حالة الإرسال
        function showStatus(text, colorClass) {
            statusMessage.className = `mt-3 text-sm text-center ${colorClass}`;
            statusMessage.innerText = text;
        }

        // 4. كود استقبال واستماع البيانات السحابية الحية (Live Stream)
        // سيقوم هذا الكود بتحديث الواجهة تلقائياً وبسرعة بمجرد إضافة بيانات جديدة في السحابة
        const q = query(messagesCollection, orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            messagesContainer.innerHTML = ''; // تفريغ الحاوية قبل التحديث

            if (snapshot.empty) {
                messagesContainer.innerHTML = `
                    <div class="text-slate-500 text-center py-8">
                        قاعدة البيانات السحابية فارغة حالياً.<br>كن أول من يضيف بياناتك!
                    </div>`;
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                const messageCard = document.createElement('div');
                messageCard.className = "bg-slate-900 p-4 rounded-xl border border-slate-800 space-y-1";
                
                // صياغة الوقت بشكل مبسط
                const timeString = data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'}) : 'الآن';

                messageCard.innerHTML = `
                    <div class="flex justify-between items-center text-xs text-slate-500">
                        <span class="font-bold text-orange-400">${escapeHTML(data.name)}</span>
                        <span>${timeString}</span>
                    </div>
                    <p class="text-slate-200 text-sm leading-relaxed">${escapeHTML(data.text)}</p>
                `;
                messagesContainer.appendChild(messageCard);
            });
        }, (error) => {
            console.error("فشل الاستماع للبيانات السحابية:", error);
            messagesContainer.innerHTML = `<div class="text-rose-400 text-center py-8">خطأ في جلب البيانات: ${error.message}</div>`;
        });

        // دالة حماية لمنع إدخال أكواد خبيثة (XSS Protection)
        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
    </script>
</body>
</html>
